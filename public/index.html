<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LimoCity Weekly Hub</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a0c; --surface: rgba(255,255,255,0.03); --surface2: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.06);
    --text: #f5f5f7; --text-muted: #86868b; --text-dim: #48484a;
    --blue: #58a6ff; --green: #3fb950; --orange: #d29922; --red: #f85149;
    --purple: #b49aff; --pink: #f778ba; --cyan: #39d2c0;
    --steve-color: #58a6ff; --thomas-color: #3fb950;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
  .container { max-width: 1280px; margin: 0 auto; padding: 24px; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
  .header h1 { font-size: 20px; font-weight: 600; color: var(--purple); }
  .header h1 span { color: var(--text-muted); font-weight: 400; }
  .meta { color: var(--text-dim); font-size: 13px; }

  /* Date filter */
  .date-filter { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .date-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 6px 14px; border-radius: var(--radius); cursor: pointer; font-size: 13px; transition: all 0.15s; }
  .date-btn:hover { border-color: rgba(255,255,255,0.12); color: var(--text); }
  .date-btn.active { background: var(--purple); border-color: var(--purple); color: #fff; }
  .date-input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: var(--radius); font-size: 13px; }
  .date-input::-webkit-calendar-picker-indicator { filter: invert(0.7); }
  select.date-input { background: var(--bg); color: var(--text); }
  select.date-input option { background: #1a1a1e; color: var(--text); padding: 6px; }

  /* Cards */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .card-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--purple); opacity: 0.7; }

  .person-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .person-stat { text-align: center; }
  .person-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .steve-label { color: var(--steve-color); }
  .thomas-label { color: var(--thomas-color); }
  .big-number { font-size: 32px; font-weight: 700; }
  .stat-sub { font-size: 14px; color: var(--text-muted); margin-top: 2px; }
  .stat-detail { font-size: 13px; color: var(--text-muted); margin-top: 4px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; max-width: 100%; }

  /* Chart cards */
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 24px; }
  .chart-wrap { position: relative; height: 280px; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }

  /* Project bars */
  .project-section { margin-bottom: 20px; }
  .project-bar-wrap { display: flex; height: 32px; border-radius: 6px; overflow: hidden; cursor: pointer; margin-top: 8px; }
  .project-segment { display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #fff; transition: opacity 0.15s; min-width: 2px; }
  .project-segment:hover { opacity: 0.8; }
  .project-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
  .project-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); cursor: pointer; padding: 3px 8px; border-radius: 12px; transition: all 0.15s; }
  .project-legend-item:hover { background: var(--surface2); color: var(--text); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

  /* Drill-down panel */
  .drill-panel { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-top: 12px; display: none; animation: slideDown 0.2s ease-out; }
  .drill-panel.open { display: block; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .drill-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .drill-title { font-size: 14px; font-weight: 600; }
  .drill-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 18px; padding: 4px 8px; }
  .drill-close:hover { color: var(--text); }

  /* Commit items */
  .commit-list { max-height: 500px; overflow-y: auto; }
  .commit-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); align-items: flex-start; cursor: pointer; }
  .commit-item:last-child { border-bottom: none; }
  .commit-item:hover { background: rgba(255,255,255,0.02); }
  .commit-score { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; flex-shrink: 0; }
  .commit-body { flex: 1; min-width: 0; }
  .commit-msg-text { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .commit-meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; display: flex; gap: 8px; align-items: center; }
  .commit-full { display: none; font-size: 12px; color: var(--text-muted); margin-top: 8px; padding: 8px 12px; background: var(--bg); border-radius: 6px; white-space: pre-wrap; word-break: break-word; }
  .commit-full.open { display: block; }
  .commit-tag { font-size: 10px; font-weight: 600; padding: 1px 7px; border-radius: 8px; text-transform: uppercase; letter-spacing: 0.3px; }
  .commit-date { font-size: 12px; color: var(--text-dim); flex-shrink: 0; white-space: nowrap; }

  .cat-feature { background: rgba(88,166,255,0.15); color: var(--blue); }
  .cat-bugfix { background: rgba(248,81,73,0.15); color: var(--red); }
  .cat-deploy { background: rgba(63,185,80,0.15); color: var(--green); }
  .cat-docs { background: rgba(139,148,158,0.15); color: var(--text-muted); }
  .cat-refactor { background: rgba(210,153,34,0.15); color: var(--orange); }
  .cat-test { background: rgba(188,140,255,0.15); color: var(--purple); }
  .cat-infra { background: rgba(139,148,158,0.15); color: var(--text-dim); }
  .cat-design { background: rgba(247,120,186,0.15); color: var(--pink); }
  .cat-ops { background: rgba(57,210,192,0.15); color: var(--cyan); }
  .cat-other { background: rgba(139,148,158,0.1); color: var(--text-dim); }

  /* Impact explainer */
  .explainer-toggle { font-size: 12px; color: var(--blue); cursor: pointer; border: none; background: none; }
  .explainer-toggle:hover { text-decoration: underline; }
  .explainer { display: none; margin-top: 12px; padding: 16px; background: var(--bg); border-radius: var(--radius); font-size: 13px; color: var(--text-muted); line-height: 1.8; }
  .explainer.open { display: block; }
  .explainer code { color: var(--text); background: var(--surface2); padding: 1px 6px; border-radius: 4px; font-size: 12px; }

  /* GitHub Command Center */
  .cc-section { margin-bottom: 24px; }
  .cc-priority-banner { background: rgba(210,153,34,0.1); border: 1px solid rgba(210,153,34,0.3); border-radius: var(--radius); padding: 14px 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  .cc-priority-icon { font-size: 18px; flex-shrink: 0; }
  .cc-priority-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--orange); }
  .cc-priority-text { font-size: 13px; color: var(--text-muted); }
  .cc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 768px) { .cc-grid { grid-template-columns: 1fr; } }
  .cc-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; cursor: pointer; transition: all 0.15s; }
  .cc-card:hover { border-color: var(--text-dim); }
  .cc-card.cc-top-priority { border-color: var(--orange); }
  .cc-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .cc-card-name { font-size: 15px; font-weight: 600; }
  .cc-status-badge { font-size: 10px; font-weight: 600; padding: 2px 9px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.3px; }
  .cc-status-on-track { background: rgba(63,185,80,0.15); color: var(--green); }
  .cc-status-at-risk { background: rgba(210,153,34,0.15); color: var(--orange); }
  .cc-status-blocked { background: rgba(248,81,73,0.15); color: var(--red); }
  .cc-status-complete { background: rgba(88,166,255,0.15); color: var(--blue); }
  .cc-status-maintenance { background: rgba(139,148,158,0.15); color: var(--text-muted); }
  .cc-owner-badge { font-size: 10px; font-weight: 600; padding: 2px 9px; border-radius: 10px; background: var(--surface2); color: var(--text-dim); }
  .cc-headline { font-size: 13px; color: var(--text-muted); margin-bottom: 10px; line-height: 1.4; }
  .cc-readiness-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .cc-readiness-bar { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .cc-readiness-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease-out; }
  .cc-readiness-pct { font-size: 14px; font-weight: 700; min-width: 38px; text-align: right; }
  .cc-momentum { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; display: inline-flex; align-items: center; gap: 3px; }
  .cc-momentum-accelerating { background: rgba(63,185,80,0.12); color: var(--green); }
  .cc-momentum-steady { background: rgba(88,166,255,0.12); color: var(--blue); }
  .cc-momentum-slowing { background: rgba(210,153,34,0.12); color: var(--orange); }
  .cc-momentum-stalled { background: rgba(248,81,73,0.12); color: var(--red); }
  .cc-expand-hint { font-size: 11px; color: var(--text-dim); opacity: 0.6; margin-top: 6px; }
  .cc-detail { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); animation: slideDown 0.2s ease-out; }
  .cc-detail.open { display: block; }
  .cc-detail-section { margin-bottom: 10px; }
  .cc-detail-section:last-child { margin-bottom: 0; }
  .cc-detail-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 4px; }
  .cc-detail-list { list-style: none; padding: 0; margin: 0; }
  .cc-detail-list.wins li { color: var(--text-muted); padding: 2px 0; font-size: 13px; }
  .cc-detail-list.wins li::before { content: '\2713 '; color: var(--green); font-weight: 700; margin-right: 4px; }
  .cc-detail-list.steps li { color: var(--blue); padding: 2px 0; font-size: 13px; }
  .cc-detail-list.steps li::before { content: '\2192 '; font-weight: 700; margin-right: 4px; }
  .cc-detail-list.risks li { color: var(--orange); padding: 2px 0; font-size: 13px; }
  .cc-detail-list.risks li::before { content: '\26A0 '; font-weight: 700; margin-right: 4px; }
  .cc-skeleton { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
  .cc-skeleton-line { height: 12px; background: var(--surface2); border-radius: 4px; margin-bottom: 10px; animation: digestPulse 1.5s ease-in-out infinite; }
  .cc-skeleton-line:nth-child(1) { width: 40%; }
  .cc-skeleton-line:nth-child(2) { width: 70%; height: 8px; }
  .cc-skeleton-line:nth-child(3) { width: 100%; height: 8px; }
  .cc-skeleton-line:nth-child(4) { width: 55%; height: 10px; }

  /* Digest cards */
  .digest-project { padding: 12px; border-radius: 6px; cursor: pointer; transition: background 0.15s; border: 1px solid transparent; margin-bottom: 8px; }
  .digest-project:hover { background: var(--surface2); border-color: var(--border); }
  .digest-project:last-child { margin-bottom: 0; }
  .digest-row { display: flex; align-items: center; gap: 8px; }
  .digest-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .digest-name { font-size: 14px; font-weight: 600; }
  .digest-stats { margin-left: auto; font-size: 12px; color: var(--text-dim); white-space: nowrap; }
  .digest-effort-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  /* Status cards (AI-generated structured summaries) */
  .status-card { margin: 8px 0 4px 18px; font-size: 13px; line-height: 1.5; transition: opacity 0.3s; }
  .status-card.status-loading { animation: digestPulse 1.5s ease-in-out infinite; }
  .status-card.status-ready { opacity: 0; animation: digestFadeIn 0.4s ease-out forwards; }
  .status-goal { color: var(--text-muted); margin-bottom: 4px; }
  .status-goal strong { color: var(--text); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-right: 4px; }
  .status-section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin: 5px 0 2px 0; }
  .status-list { list-style: none; padding: 0; margin: 0 0 0 2px; }
  .status-list.done li { color: var(--text-muted); padding: 1px 0; }
  .status-list.done li::before { content: '\2713 '; color: var(--green); font-weight: 700; margin-right: 4px; }
  .status-list.done-prior li { color: var(--text-dim); padding: 1px 0; }
  .status-list.done-prior li::before { content: '\2713 '; color: #ccc; font-weight: 700; margin-right: 4px; }
  .status-list.remaining li { color: var(--orange); padding: 1px 0; }
  .status-list.remaining li::before { content: '\25CB '; color: var(--orange); font-weight: 700; margin-right: 4px; }
  @keyframes digestPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  @keyframes digestFadeIn { from { opacity: 0; } to { opacity: 1; } }
  .digest-breakdown { font-size: 12px; color: var(--text-dim); margin-left: 18px; display: flex; align-items: center; gap: 6px; }
  .digest-expand-hint { font-size: 11px; color: var(--text-dim); margin-left: auto; opacity: 0.6; }
  .digest-detail { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .digest-detail.open { display: block; }
  .digest-empty { color: var(--text-dim); font-size: 13px; padding: 8px 0; }

  /* Loading */
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { background: rgba(248,81,73,0.1); border: 1px solid var(--red); color: var(--red); padding: 16px 24px; border-radius: var(--radius); text-align: center; margin-top: 20px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>LimoCity <span>Weekly Hub</span></h1>
      <div class="meta" id="meta">Loading...</div>
    </div>
    <div class="date-filter">
      <button class="date-btn" id="this-week-btn">This Week</button>
      <button class="date-btn" data-days="7">7d</button>
      <button class="date-btn" data-days="14">14d</button>
      <button class="date-btn active" data-days="30">30d</button>
      <button class="date-btn" data-days="0">All</button>
      <input type="date" class="date-input" id="date-from" title="From">
      <span style="color:var(--text-dim)">to</span>
      <input type="date" class="date-input" id="date-to" title="To">
      <button class="date-btn" id="custom-apply">Apply</button>
    </div>
  </div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <div style="color:var(--text-muted)">Fetching GitHub data...</div>
  </div>

  <div id="dashboard" style="display:none">
    <!-- Weekly Scorecard -->
    <div class="chart-card" id="weekly-scorecard-section" style="display:none"></div>

    <!-- Summary cards -->
    <div class="cards" id="summary-cards"></div>

    <!-- Website Deployment Metrics -->
    <div class="cards" id="wp-metrics-cards" style="display:none"></div>

    <!-- Impact over time (line chart) -->
    <div class="chart-card">
      <div class="card-header"><span class="card-title">Impact Over Time (Weekly)</span></div>
      <div class="chart-wrap"><canvas id="impact-trend-chart"></canvas></div>
    </div>

    <!-- Digest (clustered accomplishments, respects date filter) -->
    <div class="chart-card" id="weekly-digest-section"></div>

    <!-- GitHub Command Center -->
    <div class="chart-card cc-section" id="command-center-section"></div>

    <!-- Next Week Suggestions -->
    <div class="chart-card" id="suggestions-section" style="display:none"></div>

    <!-- Project Focus (full-width) -->
    <div class="chart-card">
      <div class="card-header"><span class="card-title">Project Focus</span></div>
      <div class="project-section">
        <div class="person-label thomas-label">Thomas</div>
        <div class="project-bar-wrap" id="thomas-project-bar"></div>
        <div class="project-legend" id="thomas-project-legend"></div>
        <div class="drill-panel" id="thomas-drill"></div>
      </div>
      <div class="project-section" style="margin-top:20px">
        <div class="person-label steve-label">Steve</div>
        <div class="project-bar-wrap" id="steve-project-bar"></div>
        <div class="project-legend" id="steve-project-legend"></div>
        <div class="drill-panel" id="steve-drill"></div>
      </div>
    </div>
  </div>
</div>

<script>
// --- State ---
let rawData = null;
let filteredData = null;
let activeDays = 30;
let charts = {};

// --- Project Colors ---
const PROJECT_COLORS = {
  'James': '#3fb950', 'Winston Thomas': '#d29922', 'Winston SOT': '#e3b341', 'Winston Voice': '#f0883e',
  'Quote Engine': '#f778ba', 'Fleet Manager': '#ff7b72',
  'Website / SEO': '#58a6ff', 'n8n / Automation': '#39d2c0', 'Database / Infra': '#bc8cff',
  'Forms / CRM': '#da70d6', 'Telephony': '#f85149', 'Docs / Admin': '#6e7681',
  'Marketing': '#e06c75', 'Tools / Setup': '#8b949e', 'Other': '#484f58',
};
const CAT_COLORS = {
  feature: '#58a6ff', bugfix: '#f85149', deploy: '#3fb950', docs: '#8b949e',
  refactor: '#d29922', test: '#bc8cff', infra: '#6e7681', design: '#f778ba',
  ops: '#39d2c0', other: '#484f58',
};

// --- Data Fetching ---
async function fetchData() {
  const res = await fetch('/api/fetch-stats?t=' + Date.now(), { cache: 'no-store' });
  if (!res.ok) throw new Error(`API error: ${res.status}`);
  return res.json();
}

// --- Date Filtering ---
function filterByDate(data, fromDate, toDate) {
  const f = (commits) => commits.filter(c => {
    const d = new Date(c.committedDate);
    return d >= fromDate && d <= toDate;
  });
  const filteredSynergies = (data.synergies || []).filter(s => {
    const weekDate = new Date(s.week);
    return weekDate >= fromDate && weekDate <= toDate;
  });
  return { ...data, steve: { ...data.steve, commits: f(data.steve.commits) }, thomas: { ...data.thomas, commits: f(data.thomas.commits) }, synergies: filteredSynergies };
}
function applyDateFilter(days) {
  if (days === 0) { filteredData = { ...rawData }; }
  else {
    const to = new Date(); const from = new Date(); from.setDate(from.getDate() - days);
    filteredData = filterByDate(rawData, from, to);
  }
  render();
}
function applyCustomRange() {
  const from = document.getElementById('date-from').value;
  const to = document.getElementById('date-to').value;
  if (!from || !to) return;
  filteredData = filterByDate(rawData, new Date(from + 'T00:00:00'), new Date(to + 'T23:59:59'));
  document.querySelectorAll('.date-btn[data-days]').forEach(b => b.classList.remove('active'));
  render();
}

// --- Helpers ---
function calcStats(commits) {
  const totalImpact = Math.round(commits.reduce((s, c) => s + c.impactScore, 0) * 10) / 10;
  const avgImpact = commits.length > 0 ? Math.round((totalImpact / commits.length) * 10) / 10 : 0;
  const topCommit = commits.reduce((best, c) => {
    if (!best) return c;
    if (c.impactScore > best.impactScore) return c;
    if (c.impactScore === best.impactScore && new Date(c.committedDate) > new Date(best.committedDate)) return c;
    return best;
  }, null);
  const totalChurn = commits.reduce((s, c) => s + c.additions + c.deletions, 0);
  const totalFilesTouched = commits.reduce((s, c) => s + c.filesChanged, 0);
  const estimatedTokens = totalChurn * 15;
  const efficiency = totalChurn > 0 ? Math.round((totalImpact / totalChurn) * 1000 * 10) / 10 : 0;
  return { commits: commits.length, totalImpact, avgImpact, topCommit, totalChurn, totalFilesTouched, estimatedTokens, efficiency };
}
function getProjectCounts(commits) {
  const counts = {};
  for (const c of commits) { counts[c.project] = (counts[c.project] || 0) + 1; }
  return counts;
}
function getWeekKey(dateStr) {
  const d = new Date(dateStr); const start = new Date(d);
  start.setDate(d.getDate() - d.getDay());
  return start.toISOString().slice(0, 10);
}
function formatDate(dateStr) { return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
function formatNumber(n) { return n >= 1000 ? (n / 1000).toFixed(1) + 'k' : n.toString(); }
function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

// --- WordPress Impact Bonus (Steve's SEO/page deployment work) ---
// Only fires when the active time range cleanly maps to a WP window (7d / 14d / 30d
// or "This Week"). Custom date ranges and "All" return 0 because we don't have WP
// deployment data for arbitrary spans — better to show 0 than inflate with a stale
// 30-day count (previous bug: non-data-days buttons defaulted to modifiedLast30d,
// so "This Week" and custom ranges both tacked +602 pages onto a 7-day window).
function getWPBonus(wp) {
  if (!wp || !wp.totalPages) return 0;
  const activeBtn = document.querySelector('.date-btn.active');
  if (!activeBtn) return 0;

  // Preset day buttons (7d / 14d / 30d)
  const days = activeBtn.dataset.days ? parseInt(activeBtn.dataset.days) : null;
  if (days) {
    if (days <= 7) return wp.modifiedLast7d || 0;
    if (days <= 14) return wp.modifiedLast14d || 0;
    return wp.modifiedLast30d || 0;
  }

  // "This Week" button → current Sun–Sat window, ≈ 7-day WP window
  if (activeBtn.id === 'this-week-btn') return wp.modifiedLast7d || 0;

  // Custom date range or "All" → no bonus
  return 0;
}

// --- Weekly Digest (clustered accomplishments) ---
function clusterByProject(commits) {
  const groups = {};
  for (const c of commits) {
    if (!groups[c.project]) groups[c.project] = [];
    groups[c.project].push(c);
  }
  return Object.entries(groups)
    .map(([proj, items]) => {
      const totalPts = Math.round(items.reduce((s, c) => s + c.impactScore, 0) * 10) / 10;
      const topCommit = items.reduce((best, c) => (!best || c.impactScore > best.impactScore) ? c : best, null);
      const catCounts = {};
      for (const c of items) catCounts[c.category] = (catCounts[c.category] || 0) + 1;
      const CAT_LABELS = { feature: 'feature', bugfix: 'bug fix', deploy: 'deploy', refactor: 'refactor', ops: 'ops', test: 'test', infra: 'infra', docs: 'doc', design: 'design', other: 'other' };
      const breakdown = Object.entries(catCounts)
        .sort((a, b) => b[1] - a[1])
        .map(([cat, count]) => {
          const label = CAT_LABELS[cat] || cat;
          return `${count} ${label}${count > 1 ? (label.endsWith('x') ? 'es' : 's') : ''}`;
        }).join(' \u00b7 ');

      // Effort badge
      const activeDays = new Set(items.map(c => c.committedDate.slice(0, 10))).size;
      const totalLines = items.reduce((s, c) => s + c.additions + c.deletions, 0);
      let effort;
      if (items.length === 1 || totalLines <= 20) effort = { label: 'Quick fix', color: '#6e7681' };
      else if (items.length <= 5 && activeDays <= 2) effort = { label: 'Focused work', color: '#58a6ff' };
      else if (items.length <= 14 && activeDays <= 4) effort = { label: 'Sustained build', color: '#d29922' };
      else effort = { label: 'Major initiative', color: '#bc8cff' };

      return { project: proj, items, totalPts, topCommit, breakdown, effort, activeDays, totalLines };
    })
    .sort((a, b) => b.totalPts - a.totalPts);
}

// --- Client-Side Summary Generation (fallback when AI unavailable) ---
function generateLocalSummary(cl) {
  const n = cl.items.length;
  const cats = {};
  for (const c of cl.items) cats[c.category] = (cats[c.category] || 0) + 1;
  const topCat = Object.entries(cats).sort((a, b) => b[1] - a[1])[0][0];
  const days = cl.activeDays;
  const lines = cl.totalLines;

  // Verb phrases by primary category
  const verbs = {
    feature: ['Built new functionality for', 'Added new capabilities to', 'Developed features for'],
    bugfix: ['Fixed issues in', 'Resolved bugs in', 'Addressed problems in'],
    deploy: ['Deployed updates to', 'Rolled out changes for', 'Released updates to'],
    refactor: ['Restructured and cleaned up', 'Improved the codebase for', 'Reorganized'],
    ops: ['Set up automation for', 'Configured workflows for', 'Automated processes for'],
    test: ['Added testing for', 'Verified and tested', 'Built test coverage for'],
    infra: ['Updated infrastructure for', 'Set up backend systems for', 'Configured environment for'],
    docs: ['Updated documentation for', 'Documented processes for', 'Wrote up notes for'],
    design: ['Designed architecture for', 'Planned and documented', 'Created designs for'],
    other: ['Worked on', 'Made updates to', 'Contributed to'],
  };

  // Pick a verb (deterministic based on project name length for consistency)
  const verbList = verbs[topCat] || verbs.other;
  const verb = verbList[cl.project.length % verbList.length];

  // Scope description
  let scope;
  if (n === 1) scope = 'a quick, single update';
  else if (n <= 3 && days <= 1) scope = 'a focused session';
  else if (n <= 5 && days <= 2) scope = `${n} changes over ${days === 1 ? 'one session' : 'a couple of sessions'}`;
  else if (days <= 4) scope = `${n} changes across ${days} working days`;
  else scope = `a sustained effort with ${n} changes over ${days} days`;

  // Completion signal based on most recent commit's category
  const recent = cl.items.sort((a, b) => new Date(b.committedDate) - new Date(a.committedDate))[0];
  let status = '';
  if (recent.category === 'deploy') status = ' Work appears deployed and live.';
  else if (recent.category === 'test') status = ' Currently in testing phase.';
  else if (recent.category === 'bugfix') status = ' Recent activity focused on fixes.';
  else if (n >= 5 && days >= 3) status = ' Active ongoing work.';

  // Secondary work if there are multiple categories
  const secondaryCats = Object.entries(cats).filter(([c]) => c !== topCat).sort((a, b) => b[1] - a[1]);
  let secondary = '';
  if (secondaryCats.length > 0 && secondaryCats[0][1] >= 2) {
    const secLabels = { feature: 'new features', bugfix: 'bug fixes', deploy: 'deployments', refactor: 'refactoring', ops: 'automation', test: 'testing', docs: 'documentation', infra: 'infrastructure', design: 'design work', other: 'misc updates' };
    secondary = `, including ${secLabels[secondaryCats[0][0]] || 'other work'}`;
  }

  return `${verb} ${cl.project} — ${scope}${secondary}.${status}`;
}

// --- AI Summary Fetching (batched to avoid timeouts) ---
async function fetchSummaries(clusters) {
  // Add subtle loading indicator while AI processes
  for (const cl of clusters) {
    const el = document.getElementById(cl._elId);
    if (el) el.classList.add('status-loading');
  }

  // Reset remaining items for this fetch cycle
  digestRemainingItems = [];

  // Render Website/SEO clusters immediately with real WP data (no AI needed)
  const aiClusters = [];
  for (const cl of clusters) {
    if (cl.wpMetrics && cl.project === 'Website / SEO') {
      const card = buildWPSummaryCard(cl);
      if (card) {
        const el = document.getElementById(cl._elId);
        if (el) {
          el.classList.remove('status-loading');
          el.innerHTML = renderStatusCard(card);
          el.classList.add('status-ready');
        }
        // Collect remaining items
        if (card.remaining) {
          card.remaining.forEach(r => digestRemainingItems.push({ person: cl.person, project: cl.project, text: r }));
        }
        continue;
      }
    }
    aiClusters.push(cl);
  }

  // Split remaining clusters into batches of 6 to stay under Vercel timeout
  const BATCH_SIZE = 6;
  const batches = [];
  for (let i = 0; i < aiClusters.length; i += BATCH_SIZE) {
    batches.push(aiClusters.slice(i, i + BATCH_SIZE));
  }

  // Fire all batches in parallel
  const promises = batches.map(async (batch, batchIdx) => {
    try {
      const payload = batch.map(cl => ({
        person: cl.person, project: cl.project,
        activeDays: cl.activeDays, totalLines: cl.totalLines,
        commits: cl.commits,
        priorCommits: cl.priorCommits || [],
      }));
      const res = await fetch('/api/summarize', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ clusters: payload }),
      });
      if (!res.ok) return;
      const data = await res.json();
      if (!data.cards || Object.keys(data.cards).length === 0) return;

      // Replace local summaries with structured AI status cards
      for (let j = 0; j < batch.length; j++) {
        const card = data.cards[String(j)];
        if (card) {
          const el = document.getElementById(batch[j]._elId);
          if (el) {
            el.classList.remove('status-loading');
            el.innerHTML = renderStatusCard(card);
            el.classList.add('status-ready');
          }
          // Collect remaining items for goal suggestions
          if (card.remaining) {
            card.remaining.forEach(r => digestRemainingItems.push({ person: batch[j].person, project: batch[j].project, text: r }));
          }
        }
      }
    } catch (err) {
      // Batch failed — silently skip
    }
  });

  await Promise.all(promises);
  // Remove loading state from any cards that didn't get updated
  document.querySelectorAll('.status-loading').forEach(el => el.classList.remove('status-loading'));
}

// --- Project Focus (horizontal stacked bars) ---
function renderProjectFocus(commits, person) {
  const counts = getProjectCounts(commits);
  const total = commits.length;
  if (total === 0) {
    document.getElementById(person + '-project-bar').innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:8px">No commits in this period</div>';
    document.getElementById(person + '-project-legend').innerHTML = '';
    return;
  }

  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const barEl = document.getElementById(person + '-project-bar');
  const legendEl = document.getElementById(person + '-project-legend');

  barEl.innerHTML = sorted.map(([proj, count]) => {
    const pct = (count / total * 100);
    const color = PROJECT_COLORS[proj] || '#484f58';
    const label = pct >= 12 ? `${Math.round(pct)}%` : '';
    return `<div class="project-segment" style="width:${pct}%;background:${color}" data-project="${esc(proj)}" data-person="${person}" title="${proj}: ${count} commits (${Math.round(pct)}%)">${label}</div>`;
  }).join('');

  legendEl.innerHTML = sorted.map(([proj, count]) => {
    const pct = Math.round(count / total * 100);
    const color = PROJECT_COLORS[proj] || '#484f58';
    return `<div class="project-legend-item" data-project="${esc(proj)}" data-person="${person}">

  barEl.querySelectorAll('.project-segment').forEach(el => el.addEventListener('click', () => openProjectDrill(el.dataset.person, el.dataset.project)));
  legendEl.querySelectorAll('.project-legend-item').forEach(el => el.addEventListener('click', () => openProjectDrill(el.dataset.person, el.dataset.project)));

// --- GitHub Command Center ---
function buildCommandCenterPayload(steveCommits, thomasCommits) {
  const allCommits = [
    ...steveCommits.map(c => ({ ...c, person: 'steve' })),
    ...thomasCommits.map(c => ({ ...c, person: 'thomas' })),
  ];

  // Group by project
  const groups = {};
  for (const c of allCommits) {
    if (c.project === 'Other') continue;
    if (!groups[c.project]) groups[c.project] = [];
    groups[c.project].push(c);
  }

  // Build date range label
  let dateRange;
  const activeBtn = document.querySelector('.date-btn[data-days].active');
  if (activeBtn) {
    const days = parseInt(activeBtn.dataset.days);
    dateRange = days === 0 ? 'all time' : `last ${days} days`;
  } else {
    const from = document.getElementById('date-from').value;
    const to = document.getElementById('date-to').value;
    dateRange = `${from} to ${to}`;
  }

  return Object.entries(groups).map(([name, commits]) => {
    const activeDays = new Set(commits.map(c => c.committedDate.slice(0, 10))).size;
    const totalLines = commits.reduce((s, c) => s + c.additions + c.deletions, 0);
    const contributors = [...new Set(commits.map(c => c.person))].map(p => p === 'steve' ? 'Steve' : 'Thomas');
    return {
      name,
      commitCount: commits.length,
      activeDays,
      totalLines,
      contributors,
      dateRange,
      commits: commits.map(c => c.message).slice(0, 6),
    };
  }).sort((a, b) => b.commitCount - a.commitCount).slice(0, 10);
}

function renderCommandCenter(steveCommits, thomasCommits) {
  const el = document.getElementById('command-center-section');

  // Date label
  let dateLabel;
  const activeBtn = document.querySelector('.date-btn[data-days].active');
  if (activeBtn) {
    const days = parseInt(activeBtn.dataset.days);
    dateLabel = days === 0 ? 'All Time' : `Last ${days} Days`;
  } else {
    const from = document.getElementById('date-from').value;
    const to = document.getElementById('date-to').value;
    dateLabel = `${formatDate(from)} to ${formatDate(to)}`;
  }

  const payload = buildCommandCenterPayload(steveCommits, thomasCommits);

  if (payload.length === 0) {
    el.innerHTML = `
      <div class="card-header"><span class="card-title">GitHub Command Center &mdash; ${dateLabel}</span></div>
      <div style="color:var(--text-dim);font-size:13px;padding:8px 0">No project activity in this period.</div>`;
    return;
  }

  // Show loading skeletons
  const skeletonCount = Math.min(payload.length, 6);
  el.innerHTML = `
    <div class="card-header"><span class="card-title">GitHub Command Center &mdash; ${dateLabel}</span></div>
    <div class="cc-grid">
      ${Array(skeletonCount).fill('').map(() => `
        <div class="cc-skeleton">
          <div class="cc-skeleton-line"></div>

          <div class="cc-skeleton-line"></div>
          <div class="cc-skeleton-line"></div>
        </div>`).join('')}
    </div>`;

  // Fire async API call
  fetchCommandCenter(payload, dateLabel, el);
}

async function fetchCommandCenter(payload, dateLabel, containerEl) {
  try {
    const res = await fetch('/api/command-center', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ projects: payload }),
    });
    if (!res.ok) {
      containerEl.innerHTML = `<div class="card-header"><span class="card-title">GitHub Command Center &mdash; ${dateLabel}</span></div><div style="color:var(--text-dim);font-size:13px;padding:8px 0">Could not load strategic assessment. Try refreshing.</div>`;
      return;
    }
    const data = await res.json();
    if (!data.initiatives || data.initiatives.length === 0) {
      containerEl.innerHTML = `<div class="card-header"><span class="card-title">GitHub Command Center &mdash; ${dateLabel}</span></div><div style="color:var(--text-dim);font-size:13px;padding:8px 0">Strategic assessment unavailable. Try refreshing.</div>`;
      return;
    }

    const MOMENTUM_ICONS = { accelerating: '\u25B2', steady: '\u25B6', slowing: '\u25BC', stalled: '\u25CF' };
    const STATUS_ORDER = { blocked: 0, 'at-risk': 1, 'on-track': 2, maintenance: 3, complete: 4 };

    // Sort: top priority first, then by status severity
    const sorted = data.initiatives.sort((a, b) => {
      if (a.name === data.topPriority) return -1;
      if (b.name === data.topPriority) return 1;
      return (STATUS_ORDER[a.status] ?? 5) - (STATUS_ORDER[b.status] ?? 5);
    });

    function readinessColor(pct) {
      if (pct >= 76) return 'var(--green)';
      if (pct >= 51) return 'var(--blue)';
      if (pct >= 26) return 'var(--orange)';
      return 'var(--red)';
    }

    let html = `<div class="card-header"><span class="card-title">GitHub Command Center &mdash; ${dateLabel}</span></div>`;

    // Priority banner
    if (data.topPriority) {
      html += `<div class="cc-priority-banner">
        <span class="cc-priority-icon">\u26A0</span>
        <div>
          <div class="cc-priority-label">Top Priority: ${esc(data.topPriority)}</div>
          <div class="cc-priority-text">${esc(data.topPriorityReason || '')}</div>
        </div>
      </div>`;
    }

    // Initiative cards
    html += '<div class="cc-grid">';
    sorted.forEach((init, i) => {
      const isTop = init.name === data.topPriority;
      const projColor = PROJECT_COLORS[init.name] || '#484f58';
      const barColor = readinessColor(init.readiness);
      const momentumIcon = MOMENTUM_ICONS[init.momentum] || '';
      const ownerLabel = init.owner === 'both' ? 'Both' : init.owner === 'steve' ? 'Steve' : 'Thomas';
      const statusClass = 'cc-status-' + (init.status || 'on-track').replace(/\s/g, '-');

      html += `<div class="cc-card${isTop ? ' cc-top-priority' : ''}" onclick="document.getElementById('cc-detail-${i}').classList.toggle('open')">
        <div class="cc-card-header">
          <span class="cc-card-name" style="color:${projColor}">${esc(init.name)}</span>
          <span class="cc-status-badge ${statusClass}">${esc(init.status)}</span>
          <span class="cc-owner-badge">${ownerLabel}</span>
          <span class="cc-momentum cc-momentum-${init.momentum || 'steady'}">${momentumIcon} ${esc(init.momentum || 'steady')}</span>
        </div>
        <div class="cc-headline">${esc(init.headline || '')}</div>
        <div class="cc-readiness-row">
          <div class="cc-readiness-bar"><div class="cc-readiness-bar-fill" style="width:${init.readiness}%;background:${barColor}"></div></div>
          <span class="cc-readiness-pct" style="color:${barColor}">${init.readiness}%</span>
        </div>
        <div class="cc-expand-hint">click for details</div>
        <div class="cc-detail" id="cc-detail-${i}">
          ${init.recentWins && init.recentWins.length > 0 ? `<div class="cc-detail-section"><div class="cc-detail-label">Recent Wins</div><ul class="cc-detail-list wins">${init.recentWins.map(w => `<li>${esc(w)}</li>`).join('')}</ul></div>` : ''}
          ${init.nextSteps && init.nextSteps.length > 0 ? `<div class="cc-detail-section"><div class="cc-detail-label">Next Steps</div><ul class="cc-detail-list steps">${init.nextSteps.map(s => `<li>${esc(s)}</li>`).join('')}</ul></div>` : ''}
          ${init.risks && init.risks.length > 0 ? `<div class="cc-detail-section"><div class="cc-detail-label">Risks</div><ul class="cc-detail-list risks">${init.risks.map(r => `<li>${esc(r)}</li>`).join('')}</ul></div>` : ''}
        </div>
      </div>`;
    });
    html += '</div>';

    containerEl.innerHTML = html;

    // Collect Command Center next steps as goal suggestions
    sorted.forEach(init => {
      if (init.nextSteps && init.nextSteps.length > 0) {
        // Determine person from owner field
        const person = init.owner === 'thomas' ? 'thomas' : init.owner === 'steve' ? 'steve' : null;
        if (person) {
          init.nextSteps.forEach(step => {
            // Avoid duplicates with digest remaining items
            const isDupe = digestRemainingItems.some(r => r.text === step && r.project === init.name);
            if (!isDupe) {
              digestRemainingItems.push({ person, project: init.name, text: step, source: 'command-center' });
            }
          });
        } else {
          // Owner is "both" — add to both people
          init.nextSteps.forEach(step => {
            const isDupe = digestRemainingItems.some(r => r.text === step && r.project === init.name);
            if (!isDupe) {
              digestRemainingItems.push({ person: 'steve', project: init.name, text: step, source: 'command-center' });
              digestRemainingItems.push({ person: 'thomas', project: init.name, text: step, source: 'command-center' });
            }
          });
        }
      }
    });
  } catch (err) {
    console.error('Command center fetch error:', err);
    containerEl.innerHTML = `<div class="card-header"><span class="card-title">GitHub Command Center &mdash; ${dateLabel}</span></div><div style="color:var(--text-dim);font-size:13px;padding:8px 0">Could not load strategic assessment. Try refreshing.</div>`;
  }
}

// --- Weekly Scorecard ---
let weeklyPlanData = null;

function getWeekStart(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1); // Monday
  const monday = new Date(d.setDate(diff));
  return monday.toISOString().slice(0, 10);
}

function getCurrentWeekLabel() {
  const now = new Date();
  const weekStart = getWeekStart(now);
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekEnd.getDate() + 6);
  return `${formatDate(weekStart)} – ${formatDate(weekEnd)}`;
}

async function fetchWeeklyPlan(weekKey) {
  try {
    const res = await fetch(`/api/weekly-plans?week=${weekKey}`, { cache: 'no-store' });
    if (!res.ok) return null;
    const data = await res.json();
    return data.plan || null;
  } catch { return null; }
}

async function saveGoalStatus(weekKey, person, goalId, newStatus) {
  try {
    await fetch('/api/weekly-plans', {
      method: 'PUT',

      body: JSON.stringify({ week: weekKey, person, goalId, status: newStatus }),
    });
  } catch (err) { console.error('Failed to save goal status:', err); }
}

const STATUS_CYCLE = ['not-started', 'in-progress', 'done', 'blocked'];
const STATUS_ICONS = { 'not-started': '\u25CB', 'in-progress': '\u25D4', 'done': '\u2713', 'blocked': '\u2717', 'carried-forward': '\u21AA' };
const STATUS_COLORS = { 'not-started': 'var(--text-dim)', 'in-progress': 'var(--blue)', 'done': 'var(--green)', 'blocked': 'var(--red)', 'carried-forward': 'var(--orange)' };

function renderWeeklyScorecard() {
  const el = document.getElementById('weekly-scorecard-section');

  if (!weeklyPlanData) {
    el.style.display = 'block';

      </div>`;
    return;
  }

  const plan = weeklyPlanData;
  const steveGoals = plan.steve || [];
  const thomasGoals = plan.thomas || [];

  function completionRate(goals) {
    if (goals.length === 0) return 0;
    return Math.round((goals.filter(g => g.status === 'done').length / goals.length) * 100);
  }

  function renderGoalList(goals, person, personColor) {
    if (goals.length === 0) return '<div style="color:var(--text-dim);font-size:13px">No goals set</div>';

  el.style.display = 'block';
  el.innerHTML = `
    <div class="card-header">
      <span class="card-title">Weekly Scorecard &mdash; ${getCurrentWeekLabel()}</span>
      <button class="date-btn" onclick="showPlanningForm()" style="font-size:12px">+ Set Goals</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
      <div>
        <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:8px">

          <span style="font-size:13px;color:var(--thomas-color);font-weight:600">${thomasRate}% complete</span>
          <span style="font-size:12px;color:var(--text-dim)">${thomasGoals.filter(g => g.status === 'done').length}/${thomasGoals.length}</span>
        </div>
        <div style="height:4px;background:var(--surface2);border-radius:2px;margin-bottom:12px;overflow:hidden">
          <div style="height:100%;width:${thomasRate}%;background:var(--thomas-color);border-radius:2px;transition:width 0.4s"></div>
        </div>
        ${renderGoalList(thomasGoals, 'thomas', 'var(--thomas-color)')}

      <div>
        <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:8px">
          <span class="person-label steve-label" style="margin:0">Steve</span>
          <span style="font-size:13px;color:var(--steve-color);font-weight:600">${steveRate}% complete</span>
          <span style="font-size:12px;color:var(--text-dim)">${steveGoals.filter(g => g.status === 'done').length}/${steveGoals.length}</span>
        </div>
        <div style="height:4px;background:var(--surface2);border-radius:2px;margin-bottom:12px;overflow:hidden">
          <div style="height:100%;width:${steveRate}%;background:var(--steve-color);border-radius:2px;transition:width 0.4s"></div>
        </div>
        ${renderGoalList(steveGoals, 'steve', 'var(--steve-color)')}
      </div>
    </div>
    <div id="unplanned-wins" style="margin-top:16px;display:none"></div>
  `;
}

function cycleGoalStatus(el, person, goalId) {
  const currentStatus = el.dataset.status;
  const nextIdx = (STATUS_CYCLE.indexOf(currentStatus) + 1) % STATUS_CYCLE.length;
  const newStatus = STATUS_CYCLE[nextIdx];
  el.dataset.status = newStatus;

  // Update local data
  const goals = person === 'steve' ? weeklyPlanData.steve : weeklyPlanData.thomas;
  const goal = goals.find(g => g.id === goalId);
  if (goal) goal.status = newStatus;

  // Re-render and save
  renderWeeklyScorecard();
  const weekKey = getWeekStart(new Date());
  saveGoalStatus(weekKey, person, goalId, newStatus);
}

// --- Effort Estimation ---
function estimateEffort(text) {
  const t = text.toLowerCase();

  // Quick tasks (~30 min - 1 hour): monitoring, checking, confirming, verifying
  if (/\b(monitor|check|verify|confirm|review|test stability|watch)\b/.test(t) && !/\b(build|implement|create|deploy|execute|migrate|coordinate)\b/.test(t)) {
    return { label: '~1h', hours: 1, color: 'var(--green)' };
  }

  // Multi-day tasks (16-40h): building, implementing major features, coordinating across systems
  if (/\b(build|implement|create|develop|design and implement|coordinate and deploy|execute.*migration|consolidat|expand.*coverage|full)\b/.test(t)) {
    // Check for scope indicators that push it to multi-day
    if (/\b(across|all \d+|complete|major|full|consolidat|migration|schema)\b/.test(t)) {
      return { label: '2-5 days', hours: 24, color: 'var(--red)' };
    }
    return { label: '1-2 days', hours: 12, color: 'var(--orange)' };
  }

  // Medium tasks (2-4h): deploying, activating, resolving specific issues
  if (/\b(deploy|activate|resolve|fix|set up|configure|optimize|update)\b/.test(t)) {
    return { label: '2-4h', hours: 3, color: 'var(--blue)' };
  }

  // Half-day tasks (4-8h): testing with conditions, expanding, continuing work
  if (/\b(test|continue|expand|integrate)\b/.test(t)) {
    return { label: '4-8h', hours: 6, color: 'var(--cyan)' };
  }

  // Default: medium effort
  return { label: '2-4h', hours: 3, color: 'var(--blue)' };
}

        <span style="color:var(--orange)">\u25CB</span>
        <span class="commit-tag" style="background:${projColor}22;color:${projColor}">${esc(item.project)}</span>
        <span style="color:var(--text-muted);flex:1">${esc(item.text)}</span>
        <span style="font-size:10px;font-weight:600;color:${effort.color};background:${effort.color}18;padding:1px 7px;border-radius:8px;white-space:nowrap;flex-shrink:0">${effort.label}</span>
        <button class="date-btn" onclick="addGoalFromDigest('${person}','${esc(item.text).replace(/'/g, "\\'")}','${esc(item.project).replace(/'/g, "\\'")}')" style="font-size:10px;padding:3px 8px">+ Add</button>
      </div>`;
    }).join('');
  }

  let html = `<div style="margin-bottom:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--orange)">Suggested Goals (${items.length} items)</div>
      <div style="font-size:11px;font-weight:600;color:${totalColor};background:${totalColor}18;padding:2px 10px;border-radius:10px">${totalLabel} (~${totalHours}h total)</div>
    </div>`;

  if (digestItems.length > 0) {
    html += `<div style="font-size:10px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;padding:6px 0 4px;border-bottom:1px solid var(--border)">From Digest — Remaining Work</div>`;
    html += renderItemRows(digestItems);
  }
  if (ccItems.length > 0) {
    html += `<div style="font-size:10px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:0.5px;padding:8px 0 4px;border-bottom:1px solid var(--border)">From Command Center — Next Steps</div>`;
    html += renderItemRows(ccItems);
  }

  html += '</div>';
  return html;
}

function showPlanningForm() {
  planningFormVisible = !planningFormVisible;
  const existing = document.getElementById('planning-form-section');
  if (!planningFormVisible) { if (existing) existing.style.display = 'none'; return; }

  // Always rebuild content with latest digest items
  const thomasSuggested = digestRemainingItems.filter(r => r.person === 'thomas');
  const steveSuggested = digestRemainingItems.filter(r => r.person === 'steve');

  const formHTML = `
    <div class="card-header">
      <span class="card-title">Set Weekly Goals</span>
      <button class="drill-close" onclick="showPlanningForm()">&times;</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
      <div>
        <div class="person-label thomas-label" style="margin-bottom:8px">Thomas Goals</div>
        ${buildSuggestedGoalsHTML(thomasSuggested, 'thomas')}
        <div id="plan-thomas-goals"></div>
        <button class="date-btn" onclick="addGoalInput('thomas')" style="margin-top:8px;font-size:12px">+ Add Goal</button>
      </div>
      <div>
        <div class="person-label steve-label" style="margin-bottom:8px">Steve Goals</div>
        ${buildSuggestedGoalsHTML(steveSuggested, 'steve')}
        <div id="plan-steve-goals"></div>
        <button class="date-btn" onclick="addGoalInput('steve')" style="margin-top:8px;font-size:12px">+ Add Goal</button>
      </div>
    </div>
    <div style="margin-top:16px;text-align:center">
      <button class="date-btn" onclick="saveWeeklyPlan()" style="background:var(--purple);border-color:var(--purple);color:#fff;padding:8px 24px;font-size:14px">Save Goals</button>
    </div>
  `;

  if (existing) {
    existing.innerHTML = formHTML;
    existing.style.display = 'block';
  } else {
    const formEl = document.createElement('div');
    formEl.id = 'planning-form-section';
    formEl.className = 'chart-card';
    formEl.style.cssText = 'margin-top:16px';
    formEl.innerHTML = formHTML;
    const scorecard = document.getElementById('weekly-scorecard-section');
    scorecard.parentNode.insertBefore(formEl, scorecard.nextSibling);
  }

  // Populate with existing goals or empty inputs
  populatePlanForm('thomas');
  populatePlanForm('steve');
}

function populatePlanForm(person) {
  const container = document.getElementById(`plan-${person}-goals`);
  const goals = weeklyPlanData ? (weeklyPlanData[person] || []) : [];
  container.innerHTML = '';
  if (goals.length === 0) {
    addGoalInput(person);
    return;
  }
  goals.forEach(g => addGoalInput(person, g.text, g.project));
}

function addGoalInput(person, text, project) {
  const container = document.getElementById(`plan-${person}-goals`);
  const row = document.createElement('div');
  row.style.cssText = 'display:flex;gap:8px;margin-bottom:8px;align-items:center';
  const projectOptions = Object.keys(PROJECT_COLORS).map(p => `<option value="${esc(p)}"${p === (project || '') ? ' selected' : ''}>${esc(p)}</option>`).join('');
  row.innerHTML = `
    <input type="text" class="date-input goal-text" placeholder="What needs to happen this week?" value="${esc(text || '')}" style="flex:1;padding:8px 12px">
    <select class="date-input goal-project" style="width:160px;padding:8px">${projectOptions}</select>
    <button class="drill-close" onclick="this.parentNode.remove()" style="padding:2px 6px">&times;</button>
  `;
  container.appendChild(row);
}

function addGoalFromDigest(person, text, project) {
  // Add a pre-filled goal input row
  addGoalInput(person, text, project);
  // Disable the button that was clicked
  event.target.disabled = true;
  event.target.textContent = 'Added';
  event.target.style.opacity = '0.5';
}

async function saveWeeklyPlan() {
  const weekKey = getWeekStart(new Date());

  function gatherGoals(person) {
    const container = document.getElementById(`plan-${person}-goals`);
    const rows = container.querySelectorAll('div');
    const goals = [];
    rows.forEach((row, i) => {
      const text = row.querySelector('.goal-text')?.value?.trim();
      const project = row.querySelector('.goal-project')?.value;
      if (text) {
        // Preserve existing goal ID and status if they match
        const existing = weeklyPlanData?.[person]?.find(g => g.text === text);
        goals.push({
          id: existing?.id || `${person[0]}${Date.now()}-${i}`,
          text,
          project: project || 'Other',
          status: existing?.status || 'not-started',
        });
      }
    });
    return goals;
  }

  const plan = {
    week: weekKey,
    steve: gatherGoals('steve'),
    thomas: gatherGoals('thomas'),
  };

  try {
    const res = await fetch('/api/weekly-plans', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(plan),
    });
    if (res.ok) {
      weeklyPlanData = { steve: plan.steve, thomas: plan.thomas, updatedAt: new Date().toISOString() };
      renderWeeklyScorecard();
      showPlanningForm(); // close form
    }
  } catch (err) { console.error('Failed to save plan:', err); }
}

// --- Auto-Tracking: Match commits to goals ---
function autoTrackGoals() {
  if (!weeklyPlanData || !filteredData) return;
  const weekKey = getWeekStart(new Date());

  // Get this week's commits
  const weekStart = new Date(weekKey + 'T00:00:00');
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekEnd.getDate() + 6);
  weekEnd.setHours(23, 59, 59, 999);

  const steveWeekCommits = rawData.steve.commits.filter(c => {
    const d = new Date(c.committedDate);
    return d >= weekStart && d <= weekEnd;
  });
  const thomasWeekCommits = rawData.thomas.commits.filter(c => {
    const d = new Date(c.committedDate);
    return d >= weekStart && d <= weekEnd;
  });

  // Find unplanned wins (commits in projects not covered by goals)
  function getUnplannedWins(commits, goals, person) {
    const goalProjects = new Set(goals.map(g => g.project));
    const unplannedProjects = {};
    for (const c of commits) {
      if (!goalProjects.has(c.project)) {
        if (!unplannedProjects[c.project]) unplannedProjects[c.project] = [];
        unplannedProjects[c.project].push(c);
      }
    }
    return Object.entries(unplannedProjects).map(([proj, items]) => ({
      project: proj,
      count: items.length,
      topMsg: items.sort((a, b) => b.impactScore - a.impactScore)[0].message,
    }));
  }

  const steveUnplanned = getUnplannedWins(steveWeekCommits, weeklyPlanData.steve || [], 'steve');
  const thomasUnplanned = getUnplannedWins(thomasWeekCommits, weeklyPlanData.thomas || [], 'thomas');

  const unplannedEl = document.getElementById('unplanned-wins');
  if (!unplannedEl) return;

  const allUnplanned = [
    ...steveUnplanned.map(u => ({ ...u, person: 'Steve' })),
    ...thomasUnplanned.map(u => ({ ...u, person: 'Thomas' })),
  ];

  if (allUnplanned.length === 0) { unplannedEl.style.display = 'none'; return; }

  unplannedEl.style.display = 'block';
  unplannedEl.innerHTML = `
    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--cyan);margin-bottom:8px">Unplanned Wins This Week</div>
    ${allUnplanned.map(u => {
      const projColor = PROJECT_COLORS[u.project] || '#484f58';
      return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;color:var(--text-muted)">
        <span style="color:var(--cyan)">\u2713</span>
        <span style="color:var(--text-dim)">${u.person}</span>
        <span class="commit-tag" style="background:${projColor}22;color:${projColor}">${esc(u.project)}</span>
        <span>${u.count} commit${u.count > 1 ? 's' : ''} — ${esc(u.topMsg.slice(0, 60))}</span>
      </div>`;
    }).join('')}
  `;
}

// --- AI Next-Week Suggestions ---
async function fetchAndRenderSuggestions() {
  const suggestionsEl = document.getElementById('suggestions-section');
  if (!suggestionsEl) return;

  // Build inputs
  const currentGoals = weeklyPlanData ? { steve: weeklyPlanData.steve, thomas: weeklyPlanData.thomas } : {};

  // Get command center data from DOM (last rendered)
  let commandCenter = [];
  document.querySelectorAll('.cc-card').forEach(card => {
    const name = card.querySelector('.cc-card-name')?.textContent || '';
    const status = card.querySelector('.cc-status-badge')?.textContent || '';
    const headline = card.querySelector('.cc-headline')?.textContent || '';
    const readinessPct = card.querySelector('.cc-readiness-pct')?.textContent?.replace('%', '') || '0';
    const nextSteps = [...card.querySelectorAll('.cc-detail-list.steps li')].map(li => li.textContent);
    commandCenter.push({ name, status, headline, readiness: parseInt(readinessPct), nextSteps });
  });

  // Recent commits
  const recentCommits = [
    ...rawData.steve.commits.slice(0, 10).map(c => ({ person: 'Steve', message: c.message, project: c.project })),
    ...rawData.thomas.commits.slice(0, 10).map(c => ({ person: 'Thomas', message: c.message, project: c.project })),
  ];

  suggestionsEl.innerHTML = `
    <div class="card-header"><span class="card-title">Next Week Suggestions</span></div>
    <div style="display:flex;align-items:center;gap:8px;padding:16px 0;color:var(--text-dim);font-size:13px">
      <div class="spinner" style="width:20px;height:20px;margin:0"></div> Generating suggestions...
    </div>`;

  try {
    const res = await fetch('/api/suggest-goals', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ currentGoals, commandCenter, recentCommits }),
    });

    if (!res.ok) throw new Error('Failed to fetch suggestions');
    const data = await res.json();
    const suggestions = data.suggestions;

    if (!suggestions || (!suggestions.steve?.length && !suggestions.thomas?.length)) {
      suggestionsEl.innerHTML = `
        <div class="card-header"><span class="card-title">Next Week Suggestions</span></div>
        <div style="color:var(--text-dim);font-size:13px;padding:12px 0">No suggestions available. Set this week's goals first.</div>`;
      return;
    }

    function renderSuggestionList(goals, person) {
      if (!goals || goals.length === 0) return '<div style="color:var(--text-dim);font-size:13px">No suggestions</div>';
      return goals.map(g => {
        const projColor = PROJECT_COLORS[g.project] || '#484f58';
        const isCarryForward = g.text.includes('[carry-forward]');
        const displayText = g.text.replace('[carry-forward]', '').trim();
        return `<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 4px;border-bottom:1px solid var(--border)">
          <span style="font-size:14px;color:var(--cyan);flex-shrink:0">\u2192</span>
          <div style="flex:1">
            <div style="font-size:13px;color:var(--text)">${isCarryForward ? '<span style="color:var(--orange);font-size:10px;font-weight:700;text-transform:uppercase;margin-right:6px">Carry Forward</span>' : ''}${esc(displayText)}</div>
            <span class="commit-tag" style="background:${projColor}22;color:${projColor};margin-top:3px;display:inline-block">${esc(g.project)}</span>
          </div>
          <button class="date-btn" onclick="addSuggestedGoal('${person}','${esc(displayText).replace(/'/g, "\\'")}','${esc(g.project).replace(/'/g, "\\'")}')" style="font-size:11px;flex-shrink:0">+ Add</button>
        </div>`;
      }).join('');
    }

    suggestionsEl.innerHTML = `
      <div class="card-header"><span class="card-title">Next Week Suggestions</span></div>
      ${suggestions.rationale ? `<div style="color:var(--text-muted);font-size:13px;padding:8px 0;margin-bottom:8px;border-bottom:1px solid var(--border)">${esc(suggestions.rationale)}</div>` : ''}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
        <div>
          <div class="person-label thomas-label" style="margin-bottom:8px">Thomas</div>
          ${renderSuggestionList(suggestions.thomas, 'thomas')}
        </div>
        <div>
          <div class="person-label steve-label" style="margin-bottom:8px">Steve</div>
          ${renderSuggestionList(suggestions.steve, 'steve')}
        </div>
      </div>
    `;
  } catch (err) {
    console.error('Suggestions error:', err);
    suggestionsEl.innerHTML = `
      <div class="card-header"><span class="card-title">Next Week Suggestions</span></div>
      <div style="color:var(--text-dim);font-size:13px;padding:12px 0">Could not generate suggestions. Try refreshing.</div>`;
  }
}

function addSuggestedGoal(person, text, project) {
  // Get next week's key
  const now = new Date();
  const nextMonday = new Date(now);
  nextMonday.setDate(now.getDate() + (8 - now.getDay()) % 7);
  if (nextMonday <= now) nextMonday.setDate(nextMonday.getDate() + 7);
  const nextWeekKey = nextMonday.toISOString().slice(0, 10);

  // For now, add to current week (user can move later)
  if (!weeklyPlanData) weeklyPlanData = { steve: [], thomas: [], updatedAt: new Date().toISOString() };
  const goals = weeklyPlanData[person] || [];
  goals.push({
    id: `${person[0]}${Date.now()}`,
    text,
    project,
    status: 'not-started',
  });
  weeklyPlanData[person] = goals;

  // Save and re-render
  const weekKey = getWeekStart(new Date());
  fetch('/api/weekly-plans', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ week: weekKey, steve: weeklyPlanData.steve, thomas: weeklyPlanData.thomas }),
  }).catch(err => console.error('Failed to save suggested goal:', err));

  renderWeeklyScorecard();
}

    applyDateFilter(activeDays);
  });
});
document.getElementById('custom-apply').addEventListener('click', applyCustomRange);

// "This Week" button
document.getElementById('this-week-btn').addEventListener('click', () => {
  document.querySelectorAll('.date-btn[data-days]').forEach(b => b.classList.remove('active'));
  document.getElementById('this-week-btn').classList.add('active');
  const weekStart = getWeekStart(new Date());
  const from = new Date(weekStart + 'T00:00:00');
  const to = new Date(from);
  to.setDate(to.getDate() + 6);
  to.setHours(23, 59, 59, 999);
  filteredData = filterByDate(rawData, from, to);
  render();
});

// --- Init ---
async function loadAndRender() {
  try {
    const weekKey = getWeekStart(new Date());
    const [data, plan] = await Promise.all([
      fetchData(),
      fetchWeeklyPlan(weekKey),
    ]);
    rawData = data;
    weeklyPlanData = plan;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('meta').textContent = `Last refreshed: ${new Date(rawData.generatedAt).toLocaleString()} · Thomas: ${rawData.thomas.totalCommits} total commits · Steve: ${rawData.steve.totalCommits} total commits`;
    applyDateFilter(activeDays);
  } catch (err) {
    console.error('Data fetch error:', err);
    if (!rawData) {
      document.getElementById('loading').innerHTML = `<div class="error-msg">Failed to load data: ${esc(err.message)}</div>`;
    }
  }
}

// Initial load
loadAndRender();

// Auto-refresh every 2 minutes
setInterval(loadAndRender, 2 * 60 * 1000);
</script>
